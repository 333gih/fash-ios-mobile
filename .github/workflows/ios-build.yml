# Build Fash iOS on GitHub-hosted macOS runners (Xcode 16.2, iOS 17 SDK).
# Typical flow: push to GitLab â†’ mirror to GitHub â†’ this workflow runs.
#
# Branch â†’ scheme (push / PR):
#   develop  â†’ Fash-Dev
#   main     â†’ Fash-Prod
#   master   â†’ Fash-Prod
name: iOS Build

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      scheme:
        description: Xcode scheme to build
        required: true
        default: Fash-Dev
        type: choice
        options:
          - Fash-Dev
          - Fash-Prod
          - both

concurrency:
  group: ios-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve:
    name: Resolve scheme
    runs-on: ubuntu-latest
    outputs:
      schemes: ${{ steps.matrix.outputs.schemes }}
      branch: ${{ steps.matrix.outputs.branch }}
    steps:
      - id: matrix
        env:
          EVENT: ${{ github.event_name }}
          INPUT_SCHEME: ${{ inputs.scheme }}
          REF_NAME: ${{ github.ref_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          branch="manual"

          if [ "$EVENT" = "workflow_dispatch" ]; then
            if [ "$INPUT_SCHEME" = "both" ]; then
              schemes='["Fash-Dev","Fash-Prod"]'
            else
              schemes=$(printf '%s\n' "$INPUT_SCHEME" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            fi
          else
            if [ "$EVENT" = "pull_request" ]; then
              branch="$BASE_REF"
            else
              branch="$REF_NAME"
            fi

            case "$branch" in
              develop)
                schemes='["Fash-Dev"]'
                ;;
              main|master)
                schemes='["Fash-Prod"]'
                ;;
              *)
                schemes='["Fash-Dev"]'
                ;;
            esac
          fi

          echo "event=$EVENT branch=$branch schemes=$schemes"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"
          echo "schemes=${schemes}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.scheme }} (${{ needs.resolve.outputs.branch }})
    runs-on: macos-14
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        scheme: ${{ fromJSON(needs.resolve.outputs.schemes) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          echo "Scheme: ${{ matrix.scheme }}"

      - name: Validate localization files
        run: python3 scripts/validate_strings.py

      - name: Validate Swift syntax (static)
        run: python3 scripts/validate_swift_syntax.py

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen --version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Ensure Xcode 15+ compatible project format
        run: |
          object_version=$(sed -n 's/.*objectVersion = \([0-9]*\);.*/\1/p' Fash.xcodeproj/project.pbxproj | head -1)
          echo "objectVersion=${object_version}"
          if [ "${object_version}" -gt 60 ]; then
            sed -i '' -E 's/objectVersion = [0-9]+/objectVersion = 60/' Fash.xcodeproj/project.pbxproj
            echo "Downgraded objectVersion to 60 for Xcode 15/16 compatibility"
          fi

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Fash.xcodeproj \
            -scheme "${{ matrix.scheme }}"

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project Fash.xcodeproj \
            -scheme "${{ matrix.scheme }}" \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            -derivedDataPath DerivedData \
            build \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcodebuild.log

      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log-${{ matrix.scheme }}
          path: xcodebuild.log
          retention-days: 7

      - name: Print Swift compiler errors
        if: failure()
        run: grep -E ' error:' xcodebuild.log | head -60 || true
