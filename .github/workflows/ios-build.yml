# Build Fash iOS on GitHub-hosted macOS runners (Xcode 16.2, iOS 17 SDK).
# Typical flow: push to GitLab → mirror to GitHub → this workflow runs.
#
# Branch → scheme (push / PR):
#   develop  → Fash-Dev
#   main     → Fash-Prod
#   master   → Fash-Prod
#   release/*, releases/* (PR only) → Fash-Prod
#
# Push to release/** or releases/** does NOT run this workflow — use iOS Release
# (archive + IPA already compiles the app; avoids duplicate macOS jobs).
name: iOS Build

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
      - "release/**"
      - "releases/**"
  workflow_dispatch:
    inputs:
      scheme:
        description: Xcode scheme to build
        required: true
        default: Fash-Dev
        type: choice
        options:
          - Fash-Dev
          - Fash-Prod
          - both

concurrency:
  group: ios-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve:
    name: Resolve scheme
    runs-on: ubuntu-latest
    outputs:
      schemes: ${{ steps.matrix.outputs.schemes }}
      branch: ${{ steps.matrix.outputs.branch }}
    steps:
      - id: matrix
        env:
          EVENT: ${{ github.event_name }}
          INPUT_SCHEME: ${{ inputs.scheme }}
          REF_NAME: ${{ github.ref_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          branch="manual"

          if [ "$EVENT" = "workflow_dispatch" ]; then
            if [ "$INPUT_SCHEME" = "both" ]; then
              schemes='["Fash-Dev","Fash-Prod"]'
            else
              schemes=$(printf '%s\n' "$INPUT_SCHEME" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            fi
          else
            if [ "$EVENT" = "pull_request" ]; then
              branch="$BASE_REF"
            else
              branch="$REF_NAME"
            fi

            case "$branch" in
              develop)
                schemes='["Fash-Dev"]'
                ;;
              main|master|release/*|releases/*)
                schemes='["Fash-Prod"]'
                ;;
              *)
                schemes='["Fash-Dev"]'
                ;;
            esac
          fi

          echo "event=$EVENT branch=$branch schemes=$schemes"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"
          echo "schemes=${schemes}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.scheme }} (${{ needs.resolve.outputs.branch }})
    runs-on: macos-14
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        scheme: ${{ fromJSON(needs.resolve.outputs.schemes) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          echo "Scheme: ${{ matrix.scheme }}"

      - name: Prepare Xcode project
        run: bash scripts/ci_ios_prepare.sh "${{ matrix.scheme }}"

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project Fash.xcodeproj \
            -scheme "${{ matrix.scheme }}" \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            -derivedDataPath DerivedData \
            build \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcodebuild.log

      - name: Package simulator app
        run: |
          APP="$(find DerivedData/Build/Products -type d -name 'Fash.app' -path '*iphonesimulator*' | head -1)"
          if [[ -z "${APP}" ]]; then
            echo "Fash.app (simulator) not found under DerivedData/Build/Products"
            find DerivedData/Build/Products -maxdepth 3 -type d 2>/dev/null || true
            exit 1
          fi
          echo "Packaging ${APP}"
          ditto -c -k --sequesterRsrc --keepParent "${APP}" "Fash-${{ matrix.scheme }}-Simulator.zip"

      - name: Upload simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: fash-ios-simulator-${{ matrix.scheme }}-${{ github.run_number }}
          path: Fash-${{ matrix.scheme }}-Simulator.zip
          retention-days: 14
          if-no-files-found: error

      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log-${{ matrix.scheme }}
          path: xcodebuild.log
          retention-days: 7

      - name: Print Swift compiler errors
        if: failure()
        run: grep -E ' error:' xcodebuild.log | head -60 || true
