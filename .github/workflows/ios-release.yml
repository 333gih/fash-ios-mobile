# Archive + export signed IPA for App Store / TestFlight.
# Requires Apple Developer signing secrets (see docs/CI.md).
#
# Triggers:
#   - Push releases/** or release/** (Fash-Prod): archive + IPA artifact + TestFlight (if API secrets set)
#   - Push main/master or tag ios/v*: archive + IPA artifact only
#   - Manual: Actions -> iOS Release -> Run workflow (TestFlight checkbox, default on)
name: iOS Release

on:
  workflow_dispatch:
    inputs:
      scheme:
        description: Xcode scheme to archive
        required: true
        default: Fash-Prod
        type: choice
        options:
          - Fash-Prod
          - Fash-Dev
      upload_testflight:
        description: Upload IPA to TestFlight (Fash-Prod only)
        required: false
        default: true
        type: boolean
  push:
    branches:
      - main
      - master
      - "release/**"
      - "releases/**"
    tags:
      - "ios/v*"

concurrency:
  group: ios-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Fails in ~3s with "payments have failed / spending limit" → fix GitHub Billing (not Xcode).
  # https://github.com/settings/billing
  release:
    name: Archive & export IPA
    runs-on: macos-26
    timeout-minutes: 45
    env:
      SCHEME: ${{ github.event_name == 'workflow_dispatch' && inputs.scheme || 'Fash-Prod' }}
      BUILD_CONFIGURATION: ${{ (github.event_name == 'workflow_dispatch' && inputs.scheme || 'Fash-Prod') == 'Fash-Prod' && 'ProdRelease' || 'DevRelease' }}
      ARCHIVE_PATH: build/Fash.xcarchive
      EXPORT_DIR: build/export
      IPA_PATH: build/export/Fash.ipa
      # Auto-upload on release branches; manual runs use the checkbox (default on).
      UPLOAD_TESTFLIGHT: >-
        ${{
          (github.event_name == 'workflow_dispatch' && inputs.upload_testflight) ||
          (github.event_name == 'push' && (
            startsWith(github.ref, 'refs/heads/releases/') ||
            startsWith(github.ref, 'refs/heads/release/')
          ))
        }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - name: Verify iOS 26 SDK
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Verify signing secrets
        env:
          CERT_B64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          CERT_PW: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          missing=0
          for name in CERT_B64 CERT_PW PROFILE_B64 PROFILE_NAME TEAM_ID; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing GitHub secret for ${name}. See docs/CI.md § App Store release."
              missing=1
            fi
          done
          exit "${missing}"

      - name: Patch Fash release signing
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
        run: bash scripts/ci_patch_release_signing.sh "${TEAM_ID}" "${PROFILE_NAME}"

      - name: Read expected app version
        id: app_version
        run: |
          set -euo pipefail
          MARKETING="$(grep 'MARKETING_VERSION:' project.yml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          BUILD="$(grep 'CURRENT_PROJECT_VERSION:' project.yml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "marketing=${MARKETING}" >> "${GITHUB_OUTPUT}"
          echo "build=${BUILD}" >> "${GITHUB_OUTPUT}"
          echo "Release target: ${MARKETING} (${BUILD})"

      - name: Install GoogleService-Info.plist (FCM)
        env:
          PLIST_PROD_B64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
          PLIST_DEV_B64: ${{ secrets.GOOGLE_SERVICE_INFO_DEV_PLIST_BASE64 }}
        run: |
          set -euo pipefail
          if [[ "${SCHEME}" == "Fash-Prod" ]]; then
            EXPECTED_BUNDLE="com.pc.fash-ios-mobile"
            PLIST_B64="${PLIST_PROD_B64:-}"
            if [[ -z "${PLIST_B64}" ]]; then
              echo "::error::GOOGLE_SERVICE_INFO_PLIST_BASE64 is required for Fash-Prod (TestFlight FCM). See docs/CI.md § FCM."
              exit 1
            fi
          else
            EXPECTED_BUNDLE="com.pc.fash-ios-mobile.dev"
            PLIST_B64="${PLIST_DEV_B64:-}"
            if [[ -z "${PLIST_B64}" ]]; then
              echo "::warning::GOOGLE_SERVICE_INFO_DEV_PLIST_BASE64 not set — FCM disabled for Fash-Dev IPA"
              exit 0
            fi
          fi
          echo "${PLIST_B64}" | base64 --decode > Fash/GoogleService-Info.plist
          BUNDLE_ID="$(/usr/libexec/PlistBuddy -c 'Print :BUNDLE_ID' Fash/GoogleService-Info.plist)"
          echo "Installed GoogleService-Info.plist (BUNDLE_ID=${BUNDLE_ID})"
          if [[ "${BUNDLE_ID}" != "${EXPECTED_BUNDLE}" ]]; then
            echo "::error::GoogleService-Info.plist BUNDLE_ID must be ${EXPECTED_BUNDLE} for ${SCHEME} (got ${BUNDLE_ID})"
            exit 1
          fi

      - name: Prepare Xcode project
        run: bash scripts/ci_ios_prepare.sh "${SCHEME}"

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile
        env:
          PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          PP_PATH="${RUNNER_TEMP}/fash.mobileprovision"
          echo "${PROFILE_B64}" | base64 --decode > "${PP_PATH}"
          UUID="$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i "${PP_PATH}")")"
          mkdir -p "${HOME}/Library/MobileDevice/Provisioning Profiles"
          cp "${PP_PATH}" "${HOME}/Library/MobileDevice/Provisioning Profiles/${UUID}.mobileprovision"
          echo "Installed provisioning profile UUID=${UUID}"

      - name: Verify provisioning profile includes Push
        env:
          PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          PP_PATH="${RUNNER_TEMP}/fash.mobileprovision"
          echo "${PROFILE_B64}" | base64 --decode > "${PP_PATH}"
          if [[ "${SCHEME}" == "Fash-Prod" ]]; then
            bash scripts/ci_verify_provisioning_push.sh "${PP_PATH}" "com.pc.fash-ios-mobile"
          else
            bash scripts/ci_verify_provisioning_push.sh "${PP_PATH}" "com.pc.fash-ios-mobile.dev"
          fi

      - name: Archive (iphoneos)
        id: archive
        run: |
          set -o pipefail
          mkdir -p build
          # Signing is set on the Fash target only (project.yml). No global CODE_SIGN_* (breaks Kingfisher SPM).
          xcodebuild archive \
            -project Fash.xcodeproj \
            -scheme "${SCHEME}" \
            -configuration "${BUILD_CONFIGURATION}" \
            -archivePath "${ARCHIVE_PATH}" \
            -destination 'generic/platform=iOS' \
            | tee xcodebuild-archive.log

      - name: Print xcodebuild errors
        if: failure()
        run: |
          set +euo pipefail
          for log in xcodebuild-archive.log xcodebuild-export.log; do
            [[ -f "${log}" ]] || continue
            echo "::group::${log}"
            swift_errors="$(grep -E '\.swift:[0-9]+:[0-9]+: error:' "${log}" || true)"
            if [[ -n "${swift_errors}" ]]; then
              swift_count="$(printf '%s\n' "${swift_errors}" | sed '/^$/d' | wc -l | tr -d ' ')"
              echo "Swift compile errors (${swift_count}):"
              printf '%s\n' "${swift_errors}" | head -50
              printf '%s\n' "${swift_errors}" | head -15 | while IFS= read -r line; do
                [[ -n "${line}" ]] || continue
                echo "::error::${line}"
              done
            else
              echo "(no .swift:*: error: lines — showing other failures)"
              grep -iE 'fatal error:|Invalid redeclaration|ARCHIVE FAILED|BUILD FAILED|exportArchive FAILED|Code Sign error|error: ' "${log}" \
                | grep -v ': warning:' | tail -80 || true
            fi
            echo "::endgroup::"
          done
          exit 0

      - name: Prepare ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          set -euo pipefail
          if [[ "${SCHEME}" == "Fash-Prod" ]]; then
            BUNDLE_ID="com.pc.fash-ios-mobile"
          else
            BUNDLE_ID="com.pc.fash-ios-mobile.dev"
          fi
          sed -e "s|TEAM_ID_PLACEHOLDER|${TEAM_ID}|g" \
              -e "s|BUNDLE_ID_PLACEHOLDER|${BUNDLE_ID}|g" \
              -e "s|PROFILE_NAME_PLACEHOLDER|${PROFILE_NAME}|g" \
              Config/ExportOptions-AppStore.plist > build/ExportOptions.plist

      - name: Export App Store IPA
        run: |
          set -o pipefail
          rm -rf "${EXPORT_DIR}"
          mkdir -p "${EXPORT_DIR}"
          xcodebuild -exportArchive \
            -archivePath "${ARCHIVE_PATH}" \
            -exportPath "${EXPORT_DIR}" \
            -exportOptionsPlist build/ExportOptions.plist \
            | tee xcodebuild-export.log
          ls -la "${EXPORT_DIR}"
          test -f "${IPA_PATH}" || test -n "$(find "${EXPORT_DIR}" -maxdepth 1 -name '*.ipa' -print -quit)"

      - name: Normalize IPA path
        run: |
          set -euo pipefail
          if [[ ! -f "${IPA_PATH}" ]]; then
            FOUND="$(find "${EXPORT_DIR}" -maxdepth 1 -name '*.ipa' | head -1)"
            cp "${FOUND}" build/Fash.ipa
          else
            cp "${IPA_PATH}" build/Fash.ipa
          fi
          ls -la build/Fash.ipa

      - name: Verify IPA version matches project.yml
        if: env.SCHEME == 'Fash-Prod'
        run: bash scripts/ci_verify_ipa_version.sh build/Fash.ipa

      - name: Verify IPA FCM bundle (plist + aps-environment)
        run: |
          set -euo pipefail
          if [[ "${SCHEME}" == "Fash-Prod" ]]; then
            bash scripts/ci_verify_ipa_push.sh build/Fash.ipa production
          else
            # Dev IPA: only verify push when dev Firebase plist secret was provided
            if [[ -f Fash/GoogleService-Info.plist ]]; then
              bash scripts/ci_verify_ipa_push.sh build/Fash.ipa development
            else
              echo "Skipping FCM IPA verify (no GoogleService-Info.plist for Fash-Dev)"
            fi
          fi

      - name: Verify IPA contains vi/en Localizable.strings
        if: env.SCHEME == 'Fash-Prod'
        run: bash scripts/ci_verify_ipa_l10n.sh build/Fash.ipa nav_home

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: fash-ios-ipa-${{ env.SCHEME }}-${{ github.run_number }}
          path: build/Fash.ipa
          retention-days: 30
          if-no-files-found: error

      - name: Upload archive artifact (optional debug)
        uses: actions/upload-artifact@v4
        with:
          name: fash-ios-xcarchive-${{ env.SCHEME }}-${{ github.run_number }}
          path: |
            build/Fash.xcarchive
            xcodebuild-archive.log
            xcodebuild-export.log
          retention-days: 7
          if-no-files-found: warn

      - name: Verify App Store Connect secrets
        if: env.SCHEME == 'Fash-Prod' && env.UPLOAD_TESTFLIGHT == 'true'
        env:
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for name in ISSUER_ID API_KEY_ID API_PRIVATE_KEY; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing GitHub secret for ${name}. See docs/CI.md § App Store Connect API key."
              missing=1
            fi
          done
          exit "${missing}"

      - name: Upload to TestFlight
        id: upload-testflight
        if: env.SCHEME == 'Fash-Prod' && env.UPLOAD_TESTFLIGHT == 'true'
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: build/Fash.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}

      - name: Release summary
        if: always() && steps.app_version.outcome == 'success'
        env:
          UPLOAD_TESTFLIGHT: ${{ env.UPLOAD_TESTFLIGHT }}
          UPLOAD_OUTCOME: ${{ steps.upload-testflight.outcome }}
        run: |
          echo "### iOS release" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Version: **${{ steps.app_version.outputs.marketing }} (${{ steps.app_version.outputs.build }})**" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Scheme: **${SCHEME}** · Event: **${{ github.event_name }}** · Ref: \`${{ github.ref }}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Archive: **${{ steps.archive.outcome }}**" >> "${GITHUB_STEP_SUMMARY}"
          if [[ "${{ steps.archive.outcome }}" != "success" ]]; then
            echo "- **Build failed** — expand step **Print xcodebuild errors** or download artifact \`fash-ios-release-logs-${{ github.run_number }}\`" >> "${GITHUB_STEP_SUMMARY}"
            if [[ -f xcodebuild-archive.log ]]; then
              echo "" >> "${GITHUB_STEP_SUMMARY}"
              echo "#### Swift errors (first 10)" >> "${GITHUB_STEP_SUMMARY}"
              grep -E '\.swift:[0-9]+:[0-9]+: error:' xcodebuild-archive.log | head -10 >> "${GITHUB_STEP_SUMMARY}" || true
            fi
          elif [[ "${UPLOAD_TESTFLIGHT}" == "true" ]]; then
            echo "- TestFlight upload: **${UPLOAD_OUTCOME}**" >> "${GITHUB_STEP_SUMMARY}"
            if [[ "${UPLOAD_OUTCOME}" == "success" ]]; then
              echo "- App Store Connect → TestFlight → **${{ steps.app_version.outputs.marketing }} (${{ steps.app_version.outputs.build }})** (processing ~5–30 min)" >> "${GITHUB_STEP_SUMMARY}"
            elif [[ "${UPLOAD_OUTCOME}" == "failure" ]]; then
              echo "- Expand step **Upload to TestFlight** for errors (API key, compliance, duplicate build, …)" >> "${GITHUB_STEP_SUMMARY}"
            fi
          else
            echo "- IPA artifact only (TestFlight upload skipped for this trigger/scheme)" >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload xcodebuild logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fash-ios-release-logs-${{ github.run_number }}
          path: |
            xcodebuild-archive.log
            xcodebuild-export.log
          retention-days: 14
          if-no-files-found: ignore
