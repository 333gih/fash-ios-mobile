# Archive + export signed IPA for App Store / TestFlight.
# Requires Apple Developer signing secrets (see docs/CI.md).
#
# Triggers:
#   - Push releases/** or release/** (Fash-Prod): archive + IPA artifact (no auto TestFlight)
#   - Push main/master or tag ios/v*: archive + IPA artifact only
#   - Manual: Actions -> iOS Release -> Run workflow (optional TestFlight checkbox)
name: iOS Release

on:
  workflow_dispatch:
    inputs:
      scheme:
        description: Xcode scheme to archive
        required: true
        default: Fash-Prod
        type: choice
        options:
          - Fash-Prod
          - Fash-Dev
      upload_testflight:
        description: Upload IPA to TestFlight (Fash-Prod only; not run on git push)
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
      - master
      - "release/**"
      - "releases/**"
    tags:
      - "ios/v*"

concurrency:
  group: ios-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Archive & export IPA
    runs-on: macos-26
    env:
      SCHEME: ${{ github.event_name == 'workflow_dispatch' && inputs.scheme || 'Fash-Prod' }}
      BUILD_CONFIGURATION: ${{ (github.event_name == 'workflow_dispatch' && inputs.scheme || 'Fash-Prod') == 'Fash-Prod' && 'ProdRelease' || 'DevRelease' }}
      ARCHIVE_PATH: build/Fash.xcarchive
      EXPORT_DIR: build/export
      IPA_PATH: build/export/Fash.ipa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - name: Verify iOS 26 SDK
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Verify signing secrets
        env:
          CERT_B64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          CERT_PW: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          missing=0
          for name in CERT_B64 CERT_PW PROFILE_B64 PROFILE_NAME TEAM_ID; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing GitHub secret for ${name}. See docs/CI.md § App Store release."
              missing=1
            fi
          done
          exit "${missing}"

      - name: Patch Fash release signing
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
        run: bash scripts/ci_patch_release_signing.sh "${TEAM_ID}" "${PROFILE_NAME}"

      - name: Read expected app version
        id: app_version
        run: |
          set -euo pipefail
          MARKETING="$(grep 'MARKETING_VERSION:' project.yml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          BUILD="$(grep 'CURRENT_PROJECT_VERSION:' project.yml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "marketing=${MARKETING}" >> "${GITHUB_OUTPUT}"
          echo "build=${BUILD}" >> "${GITHUB_OUTPUT}"
          echo "Release target: ${MARKETING} (${BUILD})"

      - name: Prepare Xcode project
        run: bash scripts/ci_ios_prepare.sh "${SCHEME}"

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile
        env:
          PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          PP_PATH="${RUNNER_TEMP}/fash.mobileprovision"
          echo "${PROFILE_B64}" | base64 --decode > "${PP_PATH}"
          UUID="$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i "${PP_PATH}")")"
          mkdir -p "${HOME}/Library/MobileDevice/Provisioning Profiles"
          cp "${PP_PATH}" "${HOME}/Library/MobileDevice/Provisioning Profiles/${UUID}.mobileprovision"
          echo "Installed provisioning profile UUID=${UUID}"

      - name: Archive (iphoneos)
        id: archive
        run: |
          set -o pipefail
          mkdir -p build
          # Signing is set on the Fash target only (project.yml). No global CODE_SIGN_* (breaks Kingfisher SPM).
          xcodebuild archive \
            -project Fash.xcodeproj \
            -scheme "${SCHEME}" \
            -configuration "${BUILD_CONFIGURATION}" \
            -archivePath "${ARCHIVE_PATH}" \
            -destination 'generic/platform=iOS' \
            | tee xcodebuild-archive.log

      - name: Print xcodebuild errors
        if: failure()
        run: |
          set +e
          for log in xcodebuild-archive.log xcodebuild-export.log; do
            [[ -f "${log}" ]] || continue
            echo "::group::${log}"
            grep -E 'Fash/.*\.swift:[0-9]+:[0-9]+: error:|fatal error:|Invalid redeclaration|ARCHIVE FAILED|BUILD FAILED|exportArchive FAILED|Code Sign error|Expected .+ after|Failed frontend command' "${log}" | tail -120 || echo "(no matching lines)"
            echo "::endgroup::"
          done
          exit 0

      - name: Prepare ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          set -euo pipefail
          if [[ "${SCHEME}" == "Fash-Prod" ]]; then
            BUNDLE_ID="com.pc.fash-ios-mobile"
          else
            BUNDLE_ID="com.pc.fash-ios-mobile.dev"
          fi
          sed -e "s|TEAM_ID_PLACEHOLDER|${TEAM_ID}|g" \
              -e "s|BUNDLE_ID_PLACEHOLDER|${BUNDLE_ID}|g" \
              -e "s|PROFILE_NAME_PLACEHOLDER|${PROFILE_NAME}|g" \
              Config/ExportOptions-AppStore.plist > build/ExportOptions.plist

      - name: Export App Store IPA
        run: |
          set -o pipefail
          rm -rf "${EXPORT_DIR}"
          mkdir -p "${EXPORT_DIR}"
          xcodebuild -exportArchive \
            -archivePath "${ARCHIVE_PATH}" \
            -exportPath "${EXPORT_DIR}" \
            -exportOptionsPlist build/ExportOptions.plist \
            | tee xcodebuild-export.log
          ls -la "${EXPORT_DIR}"
          test -f "${IPA_PATH}" || test -n "$(find "${EXPORT_DIR}" -maxdepth 1 -name '*.ipa' -print -quit)"

      - name: Normalize IPA path
        run: |
          set -euo pipefail
          if [[ ! -f "${IPA_PATH}" ]]; then
            FOUND="$(find "${EXPORT_DIR}" -maxdepth 1 -name '*.ipa' | head -1)"
            cp "${FOUND}" build/Fash.ipa
          else
            cp "${IPA_PATH}" build/Fash.ipa
          fi
          ls -la build/Fash.ipa

      - name: Verify IPA version matches project.yml
        if: env.SCHEME == 'Fash-Prod'
        run: bash scripts/ci_verify_ipa_version.sh build/Fash.ipa

      - name: Verify IPA contains vi/en Localizable.strings
        if: env.SCHEME == 'Fash-Prod'
        run: bash scripts/ci_verify_ipa_l10n.sh build/Fash.ipa nav_home

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: fash-ios-ipa-${{ env.SCHEME }}-${{ github.run_number }}
          path: build/Fash.ipa
          retention-days: 30
          if-no-files-found: error

      - name: Upload archive artifact (optional debug)
        uses: actions/upload-artifact@v4
        with:
          name: fash-ios-xcarchive-${{ env.SCHEME }}-${{ github.run_number }}
          path: |
            build/Fash.xcarchive
            xcodebuild-archive.log
            xcodebuild-export.log
          retention-days: 7
          if-no-files-found: warn

      - name: Verify App Store Connect secrets
        if: >-
          env.SCHEME == 'Fash-Prod'
          && github.event_name == 'workflow_dispatch'
          && inputs.upload_testflight
        env:
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for name in ISSUER_ID API_KEY_ID API_PRIVATE_KEY; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing GitHub secret for ${name}. See docs/CI.md."
              missing=1
            fi
          done
          exit "${missing}"

      - name: Upload to TestFlight
        id: upload-testflight
        if: >-
          env.SCHEME == 'Fash-Prod'
          && github.event_name == 'workflow_dispatch'
          && inputs.upload_testflight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: build/Fash.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}

      - name: Release summary
        if: always() && steps.app_version.outcome == 'success'
        run: |
          echo "### iOS release" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Version: **${{ steps.app_version.outputs.marketing }} (${{ steps.app_version.outputs.build }})**" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Scheme: **${SCHEME}** · Event: **${{ github.event_name }}** · Ref: \`${{ github.ref }}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- After upload: App Store Connect → TestFlight → **${{ steps.app_version.outputs.marketing }} (${{ steps.app_version.outputs.build }})**" >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload xcodebuild logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fash-ios-release-logs-${{ github.run_number }}
          path: |
            xcodebuild-archive.log
            xcodebuild-export.log
          retention-days: 14
          if-no-files-found: ignore
