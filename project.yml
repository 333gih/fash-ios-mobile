name: Fash
options:
  bundleIdPrefix: com.pc
  developmentLanguage: vi
  # Required so XcodeGen groups vi/en Localizable.strings as localized variants (not loose folders).
  useBaseInternationalization: true
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  # XcodeGen 2.44+ defaults to format 77 (Xcode 16). Pin for Xcode 15 CI/local.
  projectFormat: xcode15_0
  generateEmptyDirectories: true
  groupSortPosition: top

configs:
  DevDebug: debug
  DevRelease: release
  ProdDebug: debug
  ProdRelease: release

configFiles:
  DevDebug: Config/Dev.xcconfig
  DevRelease: Config/Dev.xcconfig
  ProdDebug: Config/Prod.xcconfig
  ProdRelease: Config/Prod.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0.19"
    CURRENT_PROJECT_VERSION: "167"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_FILE: Fash/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: minimal

packages:
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: "8.1.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.8.0"

targets:
  Fash:
    type: application
    platform: iOS
    sources:
      - path: Fash
        excludes:
          - "**/.DS_Store"
          - "**/*.md"
          # Firebase config: optional Copy Bundle Resource (CI decodes before xcodegen; local may omit).
          - "GoogleService-Info.plist"
          # Fonts are copied via resources; .lproj must stay in sources for Xcode localization groups.
          - "Resources/Fonts/**"
    resources:
      - path: Fash/GoogleService-Info.plist
        optional: true
        buildPhase: resources
      - path: Fash/Resources/Fonts
        excludes:
          - "**/*.md"
    # Gitignored plist may be omitted by XcodeGen Copy Bundle Resources; copy after compile into .app (CI/TestFlight FCM).
    postCompileScripts:
      - name: Embed GoogleService-Info.plist
        basedOnDependencyAnalysis: false
        script: |
          PLIST="${SRCROOT}/Fash/GoogleService-Info.plist"
          if [ ! -f "${PLIST}" ]; then
            exit 0
          fi
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          mkdir -p "${DEST}"
          cp "${PLIST}" "${DEST}/GoogleService-Info.plist"
    dependencies:
      - package: Kingfisher
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseMessaging
    settings:
      base:
        PRODUCT_NAME: Fash
      configs:
        DevDebug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEV DEBUG
          PRODUCT_BUNDLE_IDENTIFIER: com.pc.fash-ios-mobile.dev
          CODE_SIGN_ENTITLEMENTS: Fash/Fash-Dev.entitlements
        DevRelease:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEV
          PRODUCT_BUNDLE_IDENTIFIER: com.pc.fash-ios-mobile.dev
          CODE_SIGN_ENTITLEMENTS: Fash/Fash-Dev.entitlements
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: __CI_PROVISIONING_PROFILE__
          DEVELOPMENT_TEAM: __CI_TEAM_ID__
        ProdDebug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: PROD DEBUG
          PRODUCT_BUNDLE_IDENTIFIER: com.pc.fash-ios-mobile
          CODE_SIGN_ENTITLEMENTS: Fash/Fash-Prod.entitlements
        ProdRelease:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: PROD
          PRODUCT_BUNDLE_IDENTIFIER: com.pc.fash-ios-mobile
          CODE_SIGN_ENTITLEMENTS: Fash/Fash-Prod.entitlements
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: __CI_PROVISIONING_PROFILE__
          DEVELOPMENT_TEAM: __CI_TEAM_ID__
    scheme:
      testTargets: []

schemes:
  Fash-Dev:
    build:
      targets:
        Fash: all
    run:
      config: DevDebug
    archive:
      config: DevRelease
  Fash-Prod:
    build:
      targets:
        Fash: all
    run:
      config: ProdDebug
    archive:
      config: ProdRelease
