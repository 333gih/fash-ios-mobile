name: Fash
options:
  bundleIdPrefix: com.pc
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  # XcodeGen 2.44+ defaults to format 77 (Xcode 16). Pin for Xcode 15 CI/local.
  projectFormat: xcode15_0
  generateEmptyDirectories: true
  groupSortPosition: top

configs:
  DevDebug: debug
  DevRelease: release
  ProdDebug: debug
  ProdRelease: release

configFiles:
  DevDebug: Config/Dev.xcconfig
  DevRelease: Config/Dev.xcconfig
  ProdDebug: Config/Prod.xcconfig
  ProdRelease: Config/Prod.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0.7"
    CURRENT_PROJECT_VERSION: "12"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_FILE: Fash/Info.plist
    CODE_SIGN_ENTITLEMENTS: Fash/Fash.entitlements
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: minimal

packages:
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: "8.1.0"

targets:
  Fash:
    type: application
    platform: iOS
    sources:
      - path: Fash
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Fash/Resources
      - path: Fash/Assets.xcassets
    dependencies:
      - package: Kingfisher
    settings:
      base:
        PRODUCT_NAME: Fash
      configs:
        DevDebug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEV DEBUG
          PRODUCT_BUNDLE_IDENTIFIER: com.pc.fash-ios-mobile.dev
        DevRelease:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEV
          PRODUCT_BUNDLE_IDENTIFIER: com.pc.fash-ios-mobile.dev
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: __CI_PROVISIONING_PROFILE__
          DEVELOPMENT_TEAM: __CI_TEAM_ID__
        ProdDebug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: PROD DEBUG
          PRODUCT_BUNDLE_IDENTIFIER: com.pc.fash-ios-mobile
        ProdRelease:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: PROD
          PRODUCT_BUNDLE_IDENTIFIER: com.pc.fash-ios-mobile
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: __CI_PROVISIONING_PROFILE__
          DEVELOPMENT_TEAM: __CI_TEAM_ID__
    scheme:
      testTargets: []

schemes:
  Fash-Dev:
    build:
      targets:
        Fash: all
    run:
      config: DevDebug
    archive:
      config: DevRelease
  Fash-Prod:
    build:
      targets:
        Fash: all
    run:
      config: ProdDebug
    archive:
      config: ProdRelease
